<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="utf-8">
    <title>R.Sabores da Susu</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap & Font Awesome -->
    <link href="css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.10.0/css/all.min.css" rel="stylesheet">

    <!-- Template CSS -->
    <link href="css/style.css" rel="stylesheet">
</head>
<body>
<div class="container-xxl py-5">
    <div class="row g-0">
        <!-- Espaço ou imagem -->
        <div class="col-md-6 bg-light d-flex align-items-center justify-content-center">
            <h2 class="text-muted">Reserve Agora</h2>
        </div>

        <!-- Formulário -->
        <div class="col-md-6 bg-dark d-flex align-items-center">
            <div class="p-5 w-100">
                <h1 class="text-white mb-4">Faça sua Reserva</h1>

                <form id="reservaForm">
                    <div class="mb-3">
                        <input type="text" id="name" class="form-control" placeholder="Nome" required>
                    </div>
                    <div class="mb-3">
                        <input type="email" id="email" class="form-control" placeholder="Email" required>
                    </div>
                    <div class="mb-3">
                        <input type="datetime-local" id="datetime" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <select id="people" class="form-select">
                            <option value="1">1 Pessoa</option>
                            <option value="2">2 Pessoas</option>
                            <option value="3">3 Pessoas</option>
                            <option value="4">4 Pessoas</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <textarea id="message" class="form-control" rows="3" placeholder="Pedido Especial"></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Reservar</button>
                </form>

                <div id="status" class="text-white mt-3"></div>
            </div>
        </div>
    </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
const webAppURL = "https://script.google.com/macros/s/AKfycbz4DTlUJsZ6W-sSuovE4NQCsav8P5SxmjJNoXGgvjTVhinr63fVzzb14f887yEJPz4Dog/exec";

document.getElementById("reservaForm").addEventListener("submit", function(e) {
    e.preventDefault();
    const status = document.getElementById("status");
    status.innerHTML = "A enviar...";

    const data = {
        nome: document.getElementById("name").value,
        email: document.getElementById("email").value,
        datetime: document.getElementById("datetime").value,
        pessoas: document.getElementById("people").value,
        mensagem: document.getElementById("message").value
    };

    console.log("Dados a enviar:", data);

    fetch(webAppURL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(data)
    })
    .then(response => response.json())
    .then(result => {
        console.log("Resposta do servidor:", result);
        if(result.status === "OK") {
            status.innerHTML = "✅ " + result.message;
            document.getElementById("reservaForm").reset();
        } else {
            status.innerHTML = "❌ " + result.message;
        }
    })
    .catch(error => {
        status.innerHTML = "❌ Erro ao enviar!";
        console.error("Erro fetch:", error);
    });
});
</script>
</body>
</html>
